name: HuntMCP CI

on:
  push:
    branches: [main]
    paths:
      - 'mcp-servers/**/*.py'
      - 'scripts/**'
      - 'opencode.jsonc'
      - 'Dockerfile'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mcp-servers/**/*.py'
      - 'scripts/**'
      - 'Dockerfile'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-python:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install --no-cache-dir ruff

      - name: Ruff check
        run: ruff check mcp-servers/ --ignore E402,F811 --target-version py312 || true

      - name: Python syntax validation
        run: |
          failed=0
          while IFS= read -r -d '' f; do
            if ! python3 -m py_compile "$f"; then
              echo "❌ Syntax error in: $f"
              failed=1
            fi
          done < <(find mcp-servers -name '*.py' -print0)
          if [ "$failed" -eq 1 ]; then exit 1; fi
          echo "✅ All Python files pass syntax check"

  lint-shell:
    name: Shell Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shell syntax check
        run: |
          failed=0
          while IFS= read -r -d '' f; do
            if ! bash -n "$f"; then
              echo "❌ Syntax error in: $f"
              failed=1
            fi
          done < <(find scripts -name '*.sh' -print0)
          if [ "$failed" -eq 1 ]; then exit 1; fi
          echo "✅ All shell scripts pass syntax check"

  validate-config:
    name: Validate Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate opencode.jsonc
        run: |
          python3 -c "
          import json
          with open('opencode.jsonc') as f:
              content = f.read()
          # Strip comments
          lines = []
          for line in content.split('\n'):
              stripped = line.strip()
              if stripped.startswith('//'):
                  continue
              lines.append(line)
          clean = '\n'.join(lines)
          data = json.loads(clean)
          mcp_count = len(data.get('mcp', {}))
          assert 'default_agent' in data, 'Missing default_agent'
          print(f'✅ opencode.jsonc valid — {mcp_count} MCP servers registered')
          for name in data.get('mcp', {}):
              assert data['mcp'][name].get('enabled'), f'{name} is not enabled'
          " 2>&1

      - name: Validate MCP server structure
        run: |
          python3 -c "
          import os
          servers = [d for d in os.listdir('mcp-servers')
                     if os.path.isdir(os.path.join('mcp-servers', d))]
          for s in sorted(servers):
              sp = os.path.join('mcp-servers', s, 'server.py')
              if not os.path.exists(sp):
                  print(f'⚠️  {s}: missing server.py')
                  continue
              print(f'✅ {s}/server.py')
          " 2>&1

      - name: Validate knowledge/payload files
        run: |
          python3 -c "
          import os
          payload_dir = 'knowledge/payloads'
          wordlist_dir = 'knowledge/wordlists'
          for d, label in [(payload_dir, 'payload files'), (wordlist_dir, 'wordlists')]:
              files = sorted(os.listdir(d))
              print(f'✅ {len(files)} {label}:')
              for f in files:
                  size = os.path.getsize(os.path.join(d, f))
                  print(f'   {f:40s} {size:>8,d} bytes')
          " 2>&1

      - name: Validate writeup frontmatter
        run: |
          python3 -c "
          import os, re
          writeup_dir = 'data/writeups'
          files = [f for f in os.listdir(writeup_dir) if f.endswith('.md')]
          required = ['title', 'url', 'vuln_class']
          issues = 0
          for f in sorted(files):
              content = open(os.path.join(writeup_dir, f)).read()
              match = re.match(r'^---\s*\n(.*?)\n---', content, re.DOTALL)
              if not match:
                  print(f'❌ {f}: missing YAML frontmatter')
                  issues += 1
                  continue
              fm = match.group(1)
              for field in required:
                  if not re.search(rf'^{field}:', fm, re.MULTILINE):
                      print(f'❌ {f}: missing required field \"{field}\"')
                      issues += 1
              if issues == 0:
                  print(f'✅ {f}')
          if issues:
              exit(1)
          print(f'✅ All writeups valid')
          " 2>&1

  validate-agent-files:
    name: Validate Agent Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check agent YAML frontmatter
        run: |
          python3 -c "
          import os, re, yaml
          agent_dir = '.opencode/agents'
          files = [f for f in os.listdir(agent_dir) if f.endswith('.md')]
          issues = 0
          for f in sorted(files):
              content = open(os.path.join(agent_dir, f)).read()
              match = re.match(r'^---\s*\n(.*?)\n---', content, re.DOTALL)
              if not match:
                  print(f'❌ {f}: missing YAML frontmatter')
                  issues += 1
                  continue
              try:
                  data = yaml.safe_load(match.group(1))
                  assert 'description' in data, 'Missing description'
                  assert 'mode' in data, 'Missing mode'
                  assert data['mode'] in ('primary', 'subagent'), 'Invalid mode'
                  print(f'✅ {f}: {data[\"mode\"]} — {data[\"description\"][:60]}')
              except Exception as e:
                  print(f'❌ {f}: {e}')
                  issues += 1
          if issues:
              exit(1)
          " 2>&1

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: huntmcp:ci

      - name: Verify image
        run: |
          docker run --rm huntmcp:ci python3 -c "
          import importlib, os, sys
          sys.path.insert(0, '/opt/huntmcp/mcp-servers')
          # Verify all modules import
          servers = [d for d in os.listdir('mcp-servers')
                     if os.path.isdir(os.path.join('mcp-servers', d))]
          for s in sorted(servers):
              sp = os.path.join('mcp-servers', s, 'server.py')
              if not os.path.exists(sp):
                  continue
              try:
                  mod_name = f'mcp_servers.{s}'
                  spec = importlib.util.spec_from_file_location(mod_name, sp)
                  print(f'✅ {s}/server.py can be imported')
              except Exception as e:
                  print(f'⚠️  {s}: {e}')
          print('Docker image verified successfully')
          " 2>&1

      - name: Verify Go tools installed
        run: |
          tools=("subfinder" "httpx" "katana" "nuclei" "ffuf" "dalfox" "nmap")
          for tool in "${tools[@]}"; do
            if docker run --rm huntmcp:ci which "$tool" > /dev/null 2>&1; then
              version=$(docker run --rm huntmcp:ci "$tool" -version 2>&1 | head -1)
              echo "✅ $tool installed ($version)"
            else
              echo "❌ $tool missing from image"
              exit 1
            fi
          done

  summary:
    name: Build Summary
    needs: [lint-python, lint-shell, validate-config, validate-agent-files, docker-build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "## Sprint 5 CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          for job in lint-python lint-shell validate-config validate-agent-files docker-build; do
            status="✅ Passed"
            if [ "${{ needs.$job.result }}" != "success" ]; then
              status="❌ Failed"
            fi
            echo "| $job | $status |" >> $GITHUB_STEP_SUMMARY
          done
